<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlie's Lessons — Lokahi Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:       #0d4f5c;
      --teal-mid:   #1a7a6e;
      --teal-light: #e6f4f2;
      --amber:      #e8a040;
      --amber-light:#fff4e0;
      --bg:         #f5f7f9;
      --card:       #ffffff;
      --text:       #1c2b2e;
      --muted:      #5a7278;
      --border:     #dce8ea;
      --shadow:     0 8px 28px rgba(13,79,92,0.10);
      --radius:     20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-mid) 100%);
      padding: 40px 28px 36px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(232,160,64,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header .eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 10px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .header .subtitle { opacity: 0.8; font-size: 1rem; }
    .header .wave { font-size: 2rem; display: block; margin-bottom: 10px; }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 16px 60px;
    }
    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 16px;
      padding-left: 2px;
    }
    .lessons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }
    .lesson-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .lesson-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--teal-mid);
      border-radius: 4px 0 0 4px;
      transition: width 0.18s ease;
    }
    .lesson-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(13,79,92,0.14);
      border-color: #b2d8d3;
    }
    .lesson-card:hover::before { width: 6px; }
    .lesson-icon {
      font-size: 2.2rem;
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      background: var(--teal-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lesson-body { flex: 1; }
    .lesson-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--teal);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .lesson-meta {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .lesson-meta span { display: inline-flex; align-items: center; gap: 4px; }
    .lesson-arrow {
      font-size: 1.2rem;
      color: var(--teal-mid);
      opacity: 0.5;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .lesson-card:hover .lesson-arrow { opacity: 1; transform: translateX(3px); }
    .footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      padding: 0 16px 32px;
    }
    .footer a { color: var(--teal-mid); text-decoration: none; }
    @media (max-width: 540px) {
      .header h1 { font-size: 1.7rem; }
      .lesson-card { padding: 16px 18px; gap: 14px; }
      .lesson-icon { width: 44px; height: 44px; font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="wave">🔬</span>
    <div class="eyebrow">Lokahi Connect · Meaning-First Literacy™</div>
    <h1>Charlie's Lessons</h1>
    <p class="subtitle">Your assignments — tap any lesson to begin</p>
  </div>

  <div class="container">
    <div class="section-label">📚 Your Assignments</div>
    <div class="lessons">

      <a class="lesson-card" href="Cats_Informational_Assignment.html">
        <div class="lesson-icon">🐱</div>
        <div class="lesson-body">
          <div class="lesson-title">Cats Informational Writing</div>
          <div class="lesson-meta">
            <span>📖 Informational Text</span>
            <span>✍️ Writing Assignment</span>
          </div>
        </div>
        <div class="lesson-arrow">→</div>
      </a>

    </div>
  </div>

  <div class="footer">
    <p>Lokahi Connect · <a href="https://lokahiconnect.org" target="_blank">lokahiconnect.org</a></p>
  </div>

</body>
</html>

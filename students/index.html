<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
:root {
  --teal:#0d4f5c;
  --teal-mid:#1a7a6e;
  --bg:#f5f7f9;
  --card:#ffffff;
  --border:#dce8ea;
  --shadow:0 8px 28px rgba(13,79,92,0.10);
  --radius:20px;
}

body{
  font-family:Arial,sans-serif;
  background:var(--bg);
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:32px;
}

.hero{
  background:linear-gradient(135deg,var(--teal),var(--teal-mid));
  color:white;
  padding:28px;
  border-radius:var(--radius);
  margin-bottom:25px;
}

.student-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
}

.student-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  box-shadow:var(--shadow);
}

.student-card h2{
  margin-bottom:8px;
}

.student-card a{
  display:inline-block;
  background:var(--teal);
  color:white;
  text-decoration:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Student Lesson Dashboard</h1>
<p>Select a student to open their lessons.</p>
</div>

<div class="student-grid">

<div class="student-card">
<h2>Daniel</h2>
<p>Open Daniel's lessons.</p>
<a href="./daniel/">Open</a>
</div>

<div class="student-card">
<h2>Finn</h2>
<p>Open Finn's lessons.</p>
<a href="./finn/">Open</a>
</div>

<div class="student-card">
<h2>Charlie</h2>
<p>Open Charlie's lessons.</p>
<a href="./charlie/">Open</a>
</div>

</div>

</div>

</body>
</html>
